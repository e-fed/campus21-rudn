<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEBC4" />
      <stop offset="45%" stop-color="#12C4E8" />
      <stop offset="100%" stop-color="#0670C9" />
    </linearGradient>
    <linearGradient id="waterDeep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D5FB8" />
      <stop offset="100%" stop-color="#083E8C" />
    </linearGradient>
  </defs>

  <!-- фон -->
  <rect width="1200" height="630" fill="#1D2633"/>

  <!-- звёзды/точки как на сайте -->
  <circle cx="90" cy="70" r="2.5" fill="#44eb99" opacity="0.7"/>
  <circle cx="1120" cy="60" r="2" fill="#861be3" opacity="0.6"/>
  <circle cx="1050" cy="150" r="3" fill="#44eb99" opacity="0.5"/>
  <circle cx="60" cy="200" r="2" fill="#861be3" opacity="0.5"/>
  <circle cx="1150" cy="230" r="2.5" fill="#44eb99" opacity="0.6"/>

  <!-- бережок -->
  <rect x="0" y="452" width="1200" height="16" fill="#4FA23C"/>
  <rect x="0" y="466" width="1200" height="10" fill="#7A4E28"/>

  <!-- река -->
  <rect x="0" y="476" width="1200" height="154" fill="url(#waterDeep)"/>
  <rect x="0" y="476" width="1200" height="46" fill="url(#water)"/>
  <!-- волны пикселями -->
  <g fill="#ffffff" opacity="0.35">
    <rect x="40" y="500" width="18" height="4"/>
    <rect x="140" y="512" width="18" height="4"/>
    <rect x="260" y="496" width="18" height="4"/>
    <rect x="900" y="508" width="18" height="4"/>
    <rect x="1020" y="494" width="18" height="4"/>
    <rect x="1120" y="514" width="18" height="4"/>
  </g>

  <!-- ЛОГОТИП / ХЕДЕР -->
  <text x="600" y="118" font-family="PixelUni, VT323, monospace" font-size="34" fill="#44eb99" text-anchor="middle" letter-spacing="6">РУДН × ШКОЛА 21</text>

  <text x="600" y="200" font-family="PixelUni, VT323, monospace" font-size="64" fill="#ffffff" text-anchor="middle">Совместный кампус РУДН</text>
  <text x="600" y="264" font-family="PixelUni, VT323, monospace" font-size="64" fill="#ffffff" text-anchor="middle">и «Школы 21»</text>

  <text x="600" y="326" font-family="PixelUni, VT323, monospace" font-size="30" fill="#c9d4e0" text-anchor="middle">Бесплатное ИТ-обучение · «ИИ-инженер» и «Цифровой заказчик»</text>

  <!-- бейдж со стартом, в стиле shadow-pixel сайта (чёрная тень-оффсет) -->
  <rect x="394" y="360" width="416" height="60" fill="#000000"/>
  <rect x="388" y="354" width="416" height="60" fill="#44eb99" stroke="#000000" stroke-width="4"/>
  <text x="596" y="396" font-family="PixelUni, VT323, monospace" font-size="28" fill="#000000" text-anchor="middle" letter-spacing="2">СТАРТ — 18 НОЯБРЯ 2026</text>

  <!-- УТКА: точная копия DuckSprite.vue, сетка 16x16.
       scale=13, translate-Y=423 — весь спрайт (local y 4-14) укладывается
       в канвас без обрезки: bottom=423+14*13=605, top=423+4*13=475
       (ровно на границе воды/берега — так и задумано). -->
  <g transform="translate(186,423) scale(13)">
    <rect x="4" y="8" width="8" height="6" fill="#FFD700" />
    <rect x="3" y="9" width="10" height="4" fill="#FFD700" />
    <rect x="5" y="4" width="6" height="5" fill="#FFD700" />
    <rect x="10" y="6" width="4" height="2" fill="#FF8C00" />
    <rect x="8" y="5" width="1" height="1" fill="#000000" />
    <rect x="5" y="10" width="4" height="2" fill="#E6C200" />
    <rect x="2" y="9" width="2" height="2" fill="#E6C200" />
  </g>

  <!-- ЧЕРЕПАХА: точная копия TurtleSprite.vue, сетка 16x16.
       Тот же scale=13 и translate-Y=423, что и у утки — bottom=605 у обеих,
       БЕЗ обрезки канвасом (раньше при scale=16 нижняя часть обоих спрайтов
       уходила за пределы 630px высоты и совпадение по низу было лишь
       совпадением клиппинга краем, а не настоящим общим уровнем). -->
  <g transform="translate(920,423) scale(13)">
    <rect x="2" y="10" width="2" height="2" fill="#90EE90" />
    <rect x="3" y="12" width="2" height="2" fill="#90EE90" />
    <rect x="11" y="12" width="2" height="2" fill="#90EE90" />
    <rect x="4" y="10" width="8" height="2" fill="#B472EE" />
    <rect x="3" y="8" width="10" height="2" fill="#861BE3" />
    <rect x="4" y="7" width="8" height="1" fill="#861BE3" />
    <rect x="5" y="6" width="6" height="1" fill="#861BE3" />
    <rect x="5" y="8" width="2" height="2" fill="#B472EE" />
    <rect x="9" y="8" width="2" height="2" fill="#B472EE" />
    <rect x="12" y="8" width="3" height="3" fill="#90EE90" />
    <rect x="13" y="7" width="2" height="2" fill="#90EE90" />
    <rect x="13" y="8" width="1" height="1" fill="#000000" />
  </g>

  <!-- лёгкая рябь под маскотами — на одном уровне, как и сами маскоты -->
  <ellipse cx="290" cy="608" rx="65" ry="7" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="1030" cy="608" rx="70" ry="7" fill="#ffffff" opacity="0.15"/>
</svg>
